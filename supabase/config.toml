# Supabase project configuration for BoostHub Edge Functions.
# The webhook must NOT verify a JWT (Stripe calls it directly).

project_id = "boosthub"

[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-checkout]
verify_jwt = true

[functions.create-portal-session]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.telegram-voice-command]
verify_jwt = false

[functions.analyze-order]
verify_jwt = false

[functions.voice-token]
verify_jwt = true

[functions.trial-eligibility]
verify_jwt = true

[functions.fraud-assess-signup]
verify_jwt = false

[functions.fraud-review]
verify_jwt = false
